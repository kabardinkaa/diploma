services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-service:v1
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: docker
      REDIS_URL: redis://redis:6379/0
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:4317
      NO_PROXY: localhost,127.0.0.1,redis,app,phoenix
      no_proxy: localhost,127.0.0.1,redis,app,phoenix
    depends_on:
      redis:
        condition: service_healthy
      phoenix:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; opener=urllib.request.build_opener(urllib.request.ProxyHandler({})); opener.open('http://127.0.0.1:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_WORKING_DIR: /data
    volumes:
      - phoenix-data:/data
    restart: unless-stopped

volumes:
  redis_data: {}
  phoenix-data: {}